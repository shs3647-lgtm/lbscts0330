<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>SMART FMEA - 컨텍스트 메뉴</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; padding: 0; width: 1440px; min-height: 900px; font-family: 'Segoe UI', sans-serif; }
</style>
</head>
<body class="bg-gray-100">

<!-- Sidebar -->
<div class="fixed left-0 top-0 bottom-0 w-12 flex flex-col items-center py-3 gap-4 z-50" style="background:#1a237e;">
  <div class="w-8 h-8 bg-cyan-400 rounded-lg flex items-center justify-center">
    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
  </div>
</div>

<!-- Header -->
<div class="fixed top-0 left-12 right-0 z-40" style="background:#1a1f36;">
  <div class="flex items-center justify-between px-4 h-10">
    <div class="flex items-center gap-3">
      <span class="text-white font-semibold text-sm">SMART FMEA</span>
      <span class="text-slate-500 text-xs">|</span>
      <span class="text-slate-400 text-xs">APQP 품질관리 시스템</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-slate-400 text-xs">admin</span>
      <div class="w-7 h-7 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs">A</div>
    </div>
  </div>
</div>

<!-- Top Nav -->
<div class="fixed top-10 left-12 right-0 z-30 bg-slate-800 border-b border-slate-700">
  <div class="flex items-center px-4 h-8 gap-1">
    <span class="px-3 py-1 text-xs text-white bg-indigo-600 rounded">PFMEA</span>
  </div>
</div>

<!-- Main content -->
<div class="ml-12 mt-[72px]">
  <div class="bg-white border-b border-gray-200 px-4 h-8 flex items-center gap-4">
    <span class="text-xs font-semibold text-blue-600 border-b-2 border-blue-600 pb-1">워크시트(Worksheet)</span>
  </div>
  <div class="bg-gray-50 border-b border-gray-200 px-3 h-9 flex items-center">
    <span class="text-xs text-slate-500 mr-2">pfm26-f001-l68-r00</span>
  </div>
  <div class="bg-white border-b px-3 h-7 flex items-center">
    <span class="px-3 py-1 text-[11px] text-blue-600 font-semibold border-b-2 border-blue-600">구조(Structure)</span>
  </div>

  <!-- Table with context menu -->
  <div class="p-4 relative">
    <table class="w-full border-collapse text-xs">
      <thead>
        <tr class="bg-gray-100">
          <th class="border border-gray-300 px-2 py-1.5 w-10">No</th>
          <th class="border border-gray-300 px-2 py-1.5">L1 완제품공정(Product Process)</th>
          <th class="border border-gray-300 px-2 py-1.5">L2 공정(Process)</th>
          <th class="border border-gray-300 px-2 py-1.5">L3 작업요소(Work Element)</th>
          <th class="border border-gray-300 px-2 py-1.5 w-16">4M</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="border border-gray-300 px-2 py-1.5 text-center">1</td>
          <td class="border border-gray-300 px-2 py-1.5">타이어 제조</td>
          <td class="border border-gray-300 px-2 py-1.5">10-압출</td>
          <td class="border border-gray-300 px-2 py-1.5">온도설정</td>
          <td class="border border-gray-300 px-2 py-1.5 text-center">Machine</td>
        </tr>
        <tr class="bg-blue-50 border-2 border-blue-400">
          <td class="border border-gray-300 px-2 py-1.5 text-center">2</td>
          <td class="border border-gray-300 px-2 py-1.5">타이어 제조</td>
          <td class="border border-gray-300 px-2 py-1.5 font-medium text-blue-800">10-압출</td>
          <td class="border border-gray-300 px-2 py-1.5 font-medium text-blue-800">압력조절</td>
          <td class="border border-gray-300 px-2 py-1.5 text-center">Man</td>
        </tr>
        <tr>
          <td class="border border-gray-300 px-2 py-1.5 text-center">3</td>
          <td class="border border-gray-300 px-2 py-1.5">타이어 제조</td>
          <td class="border border-gray-300 px-2 py-1.5">20-성형</td>
          <td class="border border-gray-300 px-2 py-1.5">속도조절</td>
          <td class="border border-gray-300 px-2 py-1.5 text-center">Material</td>
        </tr>
        <tr>
          <td class="border border-gray-300 px-2 py-1.5 text-center">4</td>
          <td class="border border-gray-300 px-2 py-1.5">타이어 제조</td>
          <td class="border border-gray-300 px-2 py-1.5">30-가류</td>
          <td class="border border-gray-300 px-2 py-1.5">시간관리</td>
          <td class="border border-gray-300 px-2 py-1.5 text-center">Method</td>
        </tr>
      </tbody>
    </table>

    <!-- Context Menu (floating) -->
    <div class="absolute bg-white rounded-lg shadow-xl border border-gray-200 py-1 w-48 z-50" style="top: 130px; left: 420px;">
      <!-- Menu items -->
      <button class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700">
        <span class="w-4 text-center text-sm">+</span>
        <span>행 추가 <span class="text-gray-400">(Add Row)</span></span>
      </button>
      <button class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-red-600 hover:bg-red-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        <span>행 삭제 <span class="text-red-400">(Delete Row)</span></span>
      </button>

      <div class="border-t border-gray-100 my-1"></div>

      <button class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 15l7-7 7 7"/></svg>
        <span>위로 이동 <span class="text-gray-400">(Move Up)</span></span>
      </button>
      <button class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"/></svg>
        <span>아래로 이동 <span class="text-gray-400">(Move Down)</span></span>
      </button>

      <div class="border-t border-gray-100 my-1"></div>

      <button class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h7"/></svg>
        <span>행 병합 <span class="text-gray-400">(Merge Rows)</span></span>
      </button>
      <button class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-gray-700 hover:bg-blue-50 hover:text-blue-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h8m-8 6h16"/></svg>
        <span>행 분리 <span class="text-gray-400">(Split Rows)</span></span>
      </button>

      <div class="border-t border-gray-100 my-1"></div>

      <button class="w-full flex items-center gap-2.5 px-3 py-1.5 text-xs text-orange-600 hover:bg-orange-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        <span>확정 해제 <span class="text-orange-400">(Unconfirm)</span></span>
      </button>
    </div>
  </div>
</div>

</body>
</html>
