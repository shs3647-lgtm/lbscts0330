<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>SMART FMEA System - 로그인</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; padding: 0; width: 1440px; min-height: 900px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.6s ease-out; }
  @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(34,211,238,0.15); } 50% { box-shadow: 0 0 40px rgba(34,211,238,0.3); } }
  .glow { animation: pulse-glow 3s ease-in-out infinite; }
</style>
</head>
<body class="bg-gradient-to-br from-[#0a0f1e] via-[#0d1b2a] to-[#1b263b] flex items-center justify-center" style="min-height:900px;">

<!-- Background decorative elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
  <div class="absolute top-[10%] left-[15%] w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl"></div>
  <div class="absolute bottom-[20%] right-[10%] w-80 h-80 bg-blue-500/5 rounded-full blur-3xl"></div>
  <div class="absolute top-[50%] left-[50%] w-64 h-64 bg-indigo-500/5 rounded-full blur-3xl"></div>
</div>

<!-- Login Card -->
<div class="fade-in relative z-10 flex flex-col items-center" style="margin-top: -40px;">

  <!-- Logo Area -->
  <div class="mb-8 text-center">
    <div class="flex items-center justify-center gap-3 mb-3">
      <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <div>
        <h1 class="text-3xl font-bold text-white tracking-tight">SMART FMEA</h1>
        <p class="text-cyan-400 text-sm font-medium tracking-widest">QUALITY MANAGEMENT SYSTEM</p>
      </div>
    </div>
    <p class="text-slate-500 text-xs mt-2">Advanced Product Quality Planning Platform</p>
  </div>

  <!-- Login Form Card -->
  <div class="glow bg-[#111827]/90 backdrop-blur-xl rounded-2xl border border-slate-700/50 p-10 w-[420px]">
    <h2 class="text-xl font-semibold text-white mb-1">로그인 <span class="text-slate-400 text-sm font-normal">(Login)</span></h2>
    <p class="text-slate-500 text-sm mb-8">시스템에 접속하려면 로그인하세요.</p>

    <!-- ID Field -->
    <div class="mb-5">
      <label class="block text-sm text-slate-400 mb-2">아이디 <span class="text-slate-500">(ID)</span></label>
      <div class="relative">
        <div class="absolute left-3 top-1/2 -translate-y-1/2">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <input type="text" value="admin" class="w-full bg-slate-800/60 border border-slate-600/50 rounded-lg px-10 py-3 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/30 transition-all" placeholder="아이디를 입력하세요">
      </div>
    </div>

    <!-- Password Field -->
    <div class="mb-6">
      <label class="block text-sm text-slate-400 mb-2">비밀번호 <span class="text-slate-500">(Password)</span></label>
      <div class="relative">
        <div class="absolute left-3 top-1/2 -translate-y-1/2">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <input type="password" value="••••••••" class="w-full bg-slate-800/60 border border-slate-600/50 rounded-lg px-10 py-3 text-white text-sm placeholder-slate-500 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/30 transition-all" placeholder="비밀번호를 입력하세요">
        <div class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer">
          <svg class="w-5 h-5 text-slate-500 hover:text-slate-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
        </div>
      </div>
    </div>

    <!-- Remember me -->
    <div class="flex items-center justify-between mb-8">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" checked class="w-4 h-4 bg-slate-700 border-slate-600 rounded text-cyan-500 focus:ring-cyan-500/30">
        <span class="text-sm text-slate-400">로그인 상태 유지</span>
      </label>
    </div>

    <!-- Login Button -->
    <button class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-white font-semibold py-3 rounded-lg shadow-lg shadow-cyan-500/25 transition-all duration-200 text-sm">
      로그인 (Login)
    </button>

    <!-- Forgot Password -->
    <div class="mt-5 text-center">
      <a href="#" class="text-sm text-slate-500 hover:text-cyan-400 transition-colors">비밀번호 찾기 (Forgot Password)</a>
    </div>
  </div>

  <!-- Footer -->
  <div class="mt-8 text-center">
    <p class="text-slate-600 text-xs">&copy; 2026 Smart FMEA System v5.2.0</p>
    <p class="text-slate-700 text-xs mt-1">APQP &middot; PFMEA &middot; DFMEA &middot; Control Plan &middot; PFD</p>
  </div>
</div>

</body>
</html>
