# 회귀 게이트 (★8): DB·dev 서버 없이 tsc + Import/FK 가드 + 파이프라인 Vitest 묶음
# pipeline-verify GET/POST는 VERIFY_BASE_URL 설정 시 verify-import-fe-chain-layout에서만 수행

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-all:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma client (tsc / Vitest 경로)
        run: npx prisma generate

      - name: Pipeline invariants (strict)
        run: npm run guard:invariants

      - name: verify:all (tsc + import-slice + pipeline Vitest + FE layout script)
        run: npm run verify:all
